<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Santiago Metro Random Trips</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    .trip { margin-bottom: 1rem; padding: 0.5rem; border-bottom: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Random Santiago Metro Trips</h1>
  <div id="trips"></div>
  <p id="avgWait"></p>

  <script>
  async function loadData() {
    const resp = await fetch("santiago_metro.json");
    const data = await resp.json();
    return data;
  }

  // pick a random element from array
  function sample(array) {
    return array[Math.floor(Math.random() * array.length)];
  }

  // find next departure at or after current time (in minutes)
  function nextDeparture(departures, currentTime) {
    for (let t of departures) {
      if (t >= currentTime) return t;
    }
    // wrap around: take the first train next day
    return departures[0] + 24*60;
  }

  function minutesToTime(mins) {
    let h = Math.floor(mins / 60) % 24;
    let m = Math.floor(mins % 60);
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12;
    if(h===0) h=12;
    return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  function generateTrips(data, numTrips = 10) {
    const trips = [];
    const stops = Object.keys(data.stops);

    for (let i=0; i<numTrips; i++) {
      // Pick start station
      const start = sample(stops);
      const startLines = data.stops[start];
      const startLine = sample(startLines);

      // Pick end station: try to pick one on the same line or allow transfer
      let possibleEnds = stops.filter(s => {
        const lines = data.stops[s];
        return lines.includes(startLine) && s !== start;
      });

      let transfer = null;
      let endLine = startLine;
      let end;
      if(possibleEnds.length > 0 && Math.random() < 0.7) {
        // 70% chance to stay on same line
        end = sample(possibleEnds);
      } else {
        // pick end on another line, find transfer station
        end = sample(stops.filter(s => s!==start));
        const endLines = data.stops[end];
        const common = stops.filter(s => data.stops[s].includes(startLine) && data.stops[s].some(l=>endLines.includes(l)));
        if(common.length>0) transfer = sample(common);
        endLine = endLines[0]; // pick one of the lines for the end
      }

      // pick random arrival time at start
      const currentTime = Math.random() * 24 * 60;

      // wait at origin
      const originDepartures = data.trips[startLine].filter(t => t.id===start)[0].dep || data.stops[start]; // fallback
      const startDep = nextDeparture(data.trips[startLine][0].dep || [currentTime], currentTime);
      const waitStart = startDep - currentTime;

      let waitTransfer = 0;
      if(transfer) {
        const transferLine = data.stops[transfer].find(l=>l!==startLine);
        const transferDepartures = data.trips[transferLine][0].dep;
        const arrivalAtTransfer = startDep + 5; // approximate travel 5min
        const transferDep = nextDeparture(transferDepartures, arrivalAtTransfer);
        waitTransfer = transferDep - arrivalAtTransfer;
      }

      const totalWait = waitStart + waitTransfer;
      const totalTrip = totalWait + 10; // add some arbitrary travel time for visualization

      trips.push({
        start, startLine,
        end, endLine,
        transfer, waitStart, waitTransfer, totalWait, totalTrip,
        arrivalTime: minutesToTime(currentTime)
      });
    }

    return trips;
  }

  function displayTrips(trips) {
    const container = document.getElementById("trips");
    let totalWaitSum = 0;
    trips.forEach((trip,i)=>{
      totalWaitSum += trip.totalWait;
      const div = document.createElement("div");
      div.className = "trip";
      div.innerHTML = `<strong>Trip ${i+1}:</strong> Start ${trip.start} (${trip.startLine}) → End ${trip.end} (${trip.endLine})<br>
      Arrival at start: ${trip.arrivalTime}, Wait at origin: ${trip.waitStart.toFixed(1)} min
      ${trip.transfer ? `<br>Transfer at ${trip.transfer}, Wait: ${trip.waitTransfer.toFixed(1)} min` : ""}
      <br>Total trip time: ${trip.totalTrip.toFixed(1)} min`;
      container.appendChild(div);
    });
    const avg = totalWaitSum / trips.length;
    document.getElementById("avgWait").innerText = `Average wait time across trips: ${avg.toFixed(1)} minutes`;
  }

  async function main() {
    const data = await loadData();
    const trips = generateTrips(data, 10);
    displayTrips(trips);
  }

  main();
  </script>
</body>
</html>
